<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Dune Dash - Jupiter Games</title>
    <style>
      body { margin: 0; padding: 0; background-color: #000; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
      #unity-container { width: 100%; height: 100%; position: relative; }
      #unity-canvas { width: 100%; height: 100%; background: #231f20; }
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
      #unity-logo { width: 154px; height: 130px; background: url('https://picsum.photos/seed/dune/154/130') no-repeat center; margin-bottom: 10px; }
      #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; overflow: hidden; }
      #unity-progress-bar-full { width: 0%; height: 100%; background: #a855f7; transition: width 0.3s; }
      #unity-footer { display: none; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" data-pixel-art="false"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/z799gs/550o8@main/Build/Dune.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      var buildUrl = "https://cdn.jsdelivr.net/gh/z799gs/550o8@main/Build";
      var config = {
        dataUrl: buildUrl + "/Dune.data",
        frameworkUrl: buildUrl + "/Dune.framework.js",
        codeUrl: buildUrl + "/Dune.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "JupiterGames",
        productName: "Dune Dash",
        productVersion: "1.0",
      };

      loadingBar.style.display = "block";

      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
